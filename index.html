<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Openeros · Entrenamiento de golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f6fa; --card:#ffffff; --card-2:#f6f9fd; --line:#e2e7f0;
    --navy:#14213f; --navy-2:#22345a; --navy-soft:#3a4d74; --navy-deep:#0e1830;
    --ink:#14213f; --ink-soft:#5d6b85;
    --blue:#2b6cb0; --blue-lt:#e9f1fa;
    --red:#c02b3a; --red-deep:#8f1f2b;
    --amber:#c1902f; --amber-deep:#8f6a1e;
    --steel:#8a97ab; --green:#3c7d55;
    --recto:#2b6cb0; --links:#2b6cb0;
    --miss:#c1902f; --miss-deep:#8f6a1e;
    --socket:#c02b3a; --socket-deep:#8f1f2b;
    --shadow:0 4px 16px rgba(20,33,63,.10);
    --shadow-lg:0 10px 28px rgba(20,33,63,.16);
    --nav-h:60px;
    --display:"Playfair Display",Georgia,"Times New Roman",serif;
    --sans:"Inter",system-ui,sans-serif;
    --mono:"IBM Plex Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:520px;margin:0 auto;min-height:100vh;padding:calc(env(safe-area-inset-top) + 8px) 15px calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);}
  .view{animation:fade .25s ease}
  @keyframes fade{from{opacity:.4}to{opacity:1}}

  .muted{color:#95a1b6}
  .sectlabel{display:flex;align-items:center;gap:10px;margin:22px 2px 13px;color:var(--navy)}
  .sectlabel .t{font-family:var(--sans);font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:11px}
  .sectlabel .l{flex:1;height:1px;background:var(--line)}
  .chip{font-family:var(--mono);font-size:11.5px;font-weight:500;background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 8px;color:var(--ink)}
  .chip b{color:var(--blue)}
  .lightcard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);color:var(--ink)}

  .apphead{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 0}
  .brandwrap{display:flex;align-items:center;gap:11px}
  .emblem{width:44px;height:44px;flex:0 0 auto}
  .apphead .brand{display:flex;flex-direction:column;line-height:1}
  .apphead .brand .wm{font-family:var(--display);font-weight:900;font-size:23px;letter-spacing:.02em;color:var(--navy)}
  .apphead .brand .wm em{font-style:italic;color:var(--navy-soft)}
  .apphead .brand .est{font-family:var(--sans);font-weight:700;letter-spacing:.26em;font-size:7.5px;text-transform:uppercase;color:var(--navy-soft);margin-top:5px}
  .subline{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:7px 2px 0}
  .subline .est{font-family:var(--sans);font-weight:700;letter-spacing:.22em;font-size:8px;text-transform:uppercase;color:var(--navy-soft)}
  .subline .tagline{font-family:var(--display);font-style:italic;font-weight:700;font-size:12.5px;color:var(--navy);white-space:nowrap}
  .apphead .date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:right}
  .rule{height:2px;margin:11px 2px 0;background:var(--navy);border-radius:2px;opacity:.9}
  .rule.dbl{margin-top:3px;height:1px;opacity:.18}

  .hello{margin:16px 2px 4px}
  .hello .k{font-size:12.5px;color:var(--ink-soft);letter-spacing:.02em}
  .hello h1{font-family:var(--display);font-weight:800;font-size:32px;line-height:1.02;margin-top:4px;color:var(--navy)}
  .cta{display:flex;flex-direction:column;gap:11px;margin-top:16px}
  .plan-cta{position:relative;overflow:hidden;border:none;cursor:pointer;text-align:left;border-radius:15px;padding:17px 16px 16px;background:linear-gradient(140deg,#20345a,#111d38);box-shadow:var(--shadow-lg);color:#eef2f8}
  .plan-cta::after{content:"";position:absolute;right:-34px;top:-34px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%)}
  .plan-cta .lab{font-family:var(--sans);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:10.5px;color:#9fc0e8}
  .plan-cta .today{display:flex;align-items:baseline;gap:11px;margin-top:6px;position:relative;z-index:1}
  .plan-cta .sk{font-family:var(--display);font-weight:900;font-size:38px;color:#fff;line-height:.85}
  .plan-cta .sn{font-family:var(--display);font-weight:800;font-size:24px;color:#fff}
  .plan-cta .why{font-size:12.5px;color:#c4d1e4;margin-top:7px;position:relative;z-index:1}
  .plan-cta .go{position:absolute;bottom:15px;right:15px;color:#9fc0e8}
  .free-cta{border:1px solid var(--line);cursor:pointer;text-align:left;border-radius:13px;padding:13px 15px;background:#fff;color:var(--ink);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
  .free-cta .lab{font-family:var(--display);font-weight:800;font-size:18px;color:var(--navy)}
  .free-cta .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .free-cta svg{color:var(--navy-soft)}

  .weekdots{display:flex;gap:6px;margin:15px 2px 0;align-items:center}
  .weekdots .wd{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:14px;border:1px solid var(--line);color:var(--ink-soft);background:#fff}
  .weekdots .wd.done{background:var(--navy);border-color:var(--navy);color:#fff}
  .weekdots .cap{font-size:11px;color:var(--ink-soft);margin-left:5px;font-family:var(--mono)}

  .picker{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .sess-card{position:relative;overflow:hidden;cursor:pointer;text-align:left;border-radius:13px;padding:14px 15px 13px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);color:var(--ink)}
  .sess-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--navy)}
  .sess-card.foco::before{background:var(--red)}
  .sc-top{display:flex;align-items:baseline;gap:10px}
  .sc-key{font-family:var(--display);font-weight:900;font-size:26px;color:var(--navy);line-height:1}
  .sess-card.foco .sc-key{color:var(--red)}
  .sc-name{font-family:var(--display);font-weight:800;font-size:19px;line-height:1;flex:1;color:var(--ink)}
  .sc-tag{font-family:var(--sans);font-weight:700;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--navy);border-radius:5px;padding:3px 7px;white-space:nowrap}
  .sess-card.foco .sc-tag{background:var(--red)}
  .sc-desc{font-size:12.5px;color:var(--ink-soft);margin:7px 0 9px}
  .lchip{font-family:var(--mono);font-size:11px;background:var(--card-2);border:1px solid var(--line);border-radius:7px;padding:3px 8px;color:var(--ink);margin-right:5px;display:inline-block}
  .lchip b{color:var(--blue)}

  .ov-grid{display:flex;flex-direction:column;gap:10px}
  .ov{display:flex;align-items:center;gap:13px;padding:12px 14px}
  .ov .mini{width:56px;height:56px;flex:0 0 auto}
  .ov .info{flex:1;min-width:0}
  .ov .info .t{font-family:var(--display);font-weight:800;font-size:18px;line-height:1;color:var(--navy)}
  .ov .info .s{font-size:12px;color:var(--ink-soft);margin-top:3px}
  .ov .info .b{font-family:var(--mono);font-size:12px;font-weight:600;margin-top:4px}
  .ov .n{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:right;flex:0 0 auto}
  .bias-der{color:var(--red)} .bias-izq{color:var(--amber-deep)} .bias-ok{color:var(--blue)}

  .empty{padding:20px 16px;text-align:center;color:var(--ink-soft);font-size:13px}
  .empty b{color:var(--blue)}
  .warnbar{margin-top:14px;padding:11px 13px;border-radius:10px;background:#fdeef0;border:1px solid #f0c4ca;color:#8f1f2b;font-size:12px}

  /* TRAIN */
  .thead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 2px 8px}
  .thead .bk{font-family:var(--sans);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:11.5px;color:var(--navy-soft)}
  .thead .ct{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
  .thead .ct b{color:var(--navy);font-size:16px}
  .pbar{background:#e6ebf3;border:1px solid var(--line);border-radius:100px;height:8px;overflow:hidden;margin:0 2px 12px}
  .pbar .f{height:100%;width:0%;background:linear-gradient(90deg,var(--navy-2),var(--navy));border-radius:100px;transition:width .3s ease}
  .change{display:flex;align-items:center;gap:8px;background:var(--red);color:#fff;border-radius:11px 11px 0 0;padding:9px 14px;font-family:var(--display);font-weight:800;font-size:14px;margin-bottom:-11px;position:relative;z-index:2}
  .change svg{width:16px;height:16px}

  .mapwrap{padding:14px 15px 16px}
  .maprow{display:flex;gap:11px;align-items:stretch}
  .hslider{width:46px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;padding:1px 0}
  .hlab{font-family:var(--sans);font-weight:700;font-size:8.5px;letter-spacing:.06em;color:var(--ink-soft)}
  .htrack{position:relative;flex:1;width:28px;border-radius:15px;border:1px solid var(--line);overflow:hidden;touch-action:none;cursor:pointer;
    background:linear-gradient(180deg,rgba(193,144,47,.24) 0%,rgba(193,144,47,.24) 33%,rgba(43,108,176,.14) 33%,rgba(43,108,176,.14) 67%,rgba(138,151,171,.26) 67%,rgba(138,151,171,.26) 100%)}
  .htrack .z{position:absolute;left:0;right:0;height:1px;background:rgba(20,33,63,.12)}
  .htrack .z.a{top:33%} .htrack .z.b{top:67%}
  .hthumb{position:absolute;left:50%;top:50%;width:26px;height:26px;transform:translate(-50%,-50%);border-radius:50%;background:var(--navy);border:3px solid #fff;box-shadow:0 2px 8px rgba(20,33,63,.32);pointer-events:none;z-index:2}
  .hcap{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--sans);font-weight:700;font-size:8px;letter-spacing:.16em;color:var(--navy-soft);text-transform:uppercase;margin-top:2px}

  .mapbox{position:relative;flex:1;aspect-ratio:1/1;border-radius:12px;overflow:hidden;border:1px solid var(--line);touch-action:none;user-select:none;background:#d2e2da}
  .map-svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .mcorner{position:absolute;font-family:var(--mono);font-size:10px;line-height:1.2;padding:5px 7px;background:rgba(20,33,63,.86);color:#fff;border-radius:8px;pointer-events:none;z-index:3}
  .mcorner small{display:block;font-size:8px;color:#b9c4d8;letter-spacing:.02em}
  .mcorner.tl{top:8px;left:8px}
  .mcorner.tr{top:8px;right:8px;text-align:right}
  .mcorner.tr b{font-family:var(--display);font-weight:900;font-size:16px;display:block;color:#fff}
  .puck{position:absolute;width:30px;height:30px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:rgba(43,108,176,.94);border:3px solid #fff;box-shadow:0 3px 9px rgba(20,33,63,.4);pointer-events:none;z-index:2;transition:background .15s ease}
  .puck.der{background:rgba(192,43,58,.95)} .puck.izq{background:rgba(193,144,47,.96)} .puck.off{background:rgba(138,151,171,.96)}

  .readout{text-align:center;margin-top:12px;font-family:var(--display);font-weight:800;font-size:17px;color:var(--navy)}
  .readout .r-dir.der{color:var(--red)} .readout .r-dir.izq{color:var(--amber-deep)} .readout .r-ok{color:var(--blue)}
  .readout .sep{color:var(--line);margin:0 5px}
  .readout small{display:block;font-family:var(--sans);font-weight:400;font-size:11px;color:var(--ink-soft);margin-top:3px}

  .comment{width:100%;margin-top:12px;border:1px solid var(--line);background:var(--card-2);border-radius:10px;padding:10px 12px;font-family:var(--sans);font-size:13px;color:var(--ink)}
  .comment::placeholder{color:#9aa7bd}
  .comment:focus{outline:none;border-color:var(--blue)}

  .statblock{margin-top:12px;background:var(--card-2);border:1px solid var(--line);border-radius:11px;padding:11px 12px 6px}
  .sb-h{font-family:var(--sans);font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:10px;color:var(--navy-soft);margin-bottom:9px;display:flex;justify-content:space-between;align-items:baseline}
  .sb-h .c{font-family:var(--mono);color:var(--ink-soft);font-weight:500;letter-spacing:0;text-transform:none}
  .fabspace{height:78px}

  .subrow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:0 2px}
  .lnk{background:none;border:none;color:var(--ink-soft);font-family:var(--sans);font-size:12.5px;cursor:pointer;padding:6px 4px;display:flex;align-items:center;gap:5px}
  .lnk:hover{color:var(--navy)} .lnk[disabled]{opacity:.3;cursor:default}

  .fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);z-index:60;border:none;cursor:pointer;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .fab .circ{width:64px;height:64px;border-radius:50%;background:linear-gradient(140deg,#22345a,#0f1c38);border:2px solid #fff;box-shadow:0 10px 26px rgba(14,24,48,.4);display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .1s ease}
  .fab:active .circ{transform:scale(.93)}
  .fab .circ svg{width:30px;height:30px}
  .fab .cap{font-family:var(--sans);font-weight:700;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--navy);padding:2px 8px;border-radius:100px}

  .cc-card{padding:19px 18px 18px;position:relative;color:var(--ink)}
  .cc-badge{position:absolute;top:15px;right:15px;font-family:var(--sans);font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--red);border-radius:6px;padding:3px 8px}
  .cc-eyebrow{font-family:var(--sans);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:11px;color:var(--navy-soft)}
  .cc-title{font-family:var(--display);font-weight:800;font-size:28px;line-height:1.02;color:var(--navy);margin:3px 0 5px}
  .cc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
  .goal{font-size:13.5px;color:var(--ink);background:var(--blue-lt);border-left:2px solid var(--blue);border-radius:0 8px 8px 0;padding:9px 11px;margin-bottom:12px}
  .cc-items{list-style:none;display:flex;flex-direction:column;gap:8px}
  .cc-items li{display:flex;gap:9px;font-size:13px;color:var(--ink)}
  .cc-items li .dot{width:6px;height:6px;border-radius:50%;background:var(--navy);margin-top:7px;flex:0 0 auto}
  .complete{width:100%;margin-top:15px;border:none;cursor:pointer;background:var(--navy);color:#fff;font-family:var(--display);font-weight:800;font-size:19px;border-radius:12px;padding:15px;display:flex;align-items:center;justify-content:center;gap:9px}
  .complete:hover{background:var(--navy-2)}
  .complete.mand{background:var(--red)} .complete.mand:hover{background:var(--red-deep)}

  .sum-head{display:flex;gap:10px;margin-bottom:10px}
  .sum-stat{flex:1;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center}
  .sum-stat .pct{font-family:var(--display);font-weight:900;font-size:40px;line-height:.9}
  .sum-stat.good .pct{color:var(--blue)} .sum-stat.watch .pct{color:var(--red)}
  .sum-stat .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-top:3px}
  .watch-note{font-size:11px;color:var(--red-deep);text-align:center;margin:-2px 0 12px;font-weight:500}
  .putt-done{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:10px 12px;border-radius:10px;margin:8px 0}
  .putt-done.ok{background:var(--blue-lt);color:var(--blue)} .putt-done.no{background:#fdeef0;color:var(--red-deep)}

  .splitbar{margin-bottom:9px}
  .splitbar .sl{display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:3px;font-family:var(--sans);font-weight:700}
  .seg3{display:flex;height:17px;border-radius:6px;overflow:hidden;background:#eef1f6}
  .seg3 span{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px;font-weight:600;color:#fff;min-width:0}

  .board{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);color:var(--ink);overflow:hidden;margin-bottom:12px}
  .kpi-strip{display:flex;border-top:3px solid var(--navy)}
  .kpi{flex:1;padding:13px 6px;text-align:center;border-right:1px solid var(--line)}
  .kpi:last-child{border-right:none}
  .kpi .v{font-family:var(--display);font-weight:900;font-size:27px;line-height:.9;color:var(--navy)}
  .kpi .v.green{color:var(--blue)} .kpi .v.red{color:var(--red)}
  .kpi .l{font-family:var(--sans);font-weight:600;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:5px}
  .seg-ctrl{display:flex;gap:6px;margin:0 0 12px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:4px}
  .seg-ctrl button{flex:1;border:none;background:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.02em;color:var(--ink-soft);padding:9px 4px;border-radius:8px}
  .seg-ctrl button.on{background:var(--navy);color:#fff;font-weight:700}
  .diana-card{padding:16px 16px 14px;text-align:center}
  .diana-card .big{width:200px;height:200px;margin:0 auto 6px;max-width:70vw}
  .diana-card .cap{font-family:var(--display);font-weight:800;font-size:16px;color:var(--navy)}
  .diana-card .cap small{display:block;font-family:var(--sans);font-weight:400;font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .diana-bars{padding:0 16px 16px}
  .board-head{background:var(--navy);color:#fff;font-family:var(--sans);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:10.5px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
  .board-head .hint{font-weight:500;letter-spacing:.02em;text-transform:none;font-size:10px;color:#b9c4d8}
  .lbrow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--line)}
  .lbrow .rk{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink-soft);width:16px;text-align:center;flex:0 0 auto}
  .lbrow .club{font-family:var(--display);font-weight:800;font-size:16px;color:var(--navy);width:82px;flex:0 0 auto}
  .lbrow .track{flex:1;height:12px;border-radius:100px;overflow:hidden;background:#eef1f6;display:flex}
  .lbrow .track i{height:100%;display:block}
  .lbrow .pct{font-family:var(--mono);font-weight:600;font-size:13px;width:52px;text-align:right;flex:0 0 auto}
  .lbrow .pct.red{color:var(--red)} .lbrow .pct.ok{color:var(--blue)}
  .lbrow.top{background:#fdeef0}

  .node{margin-bottom:10px;overflow:hidden}
  .node>summary{list-style:none;cursor:pointer;padding:13px 15px;display:flex;align-items:center;gap:12px}
  .node>summary::-webkit-details-marker{display:none}
  .node .nmini{width:46px;height:46px;flex:0 0 auto}
  .node .ninfo{flex:1;min-width:0}
  .node .ninfo .t{font-family:var(--display);font-weight:800;font-size:18px;line-height:1;color:var(--navy)}
  .node .ninfo .s{font-size:11.5px;color:var(--ink-soft);margin-top:3px}
  .node .ninfo .b{font-family:var(--mono);font-size:11.5px;font-weight:600;margin-top:3px}
  .node .nchev{color:var(--navy-soft);transition:transform .2s ease}
  .node[open]>summary .nchev{transform:rotate(90deg)}
  .node.sub{margin:0 0 8px 0;background:var(--card-2);border:1px solid var(--line)}

(function(){

  function agg(sh){ var a={n:sh.length,izq:0,centro:0,der:0,corto:0,bien:0,largo:0,hbajo:0,hbien:0,halto:0,sx:0,sy:0,shh:0};

  function targetSVG(sh,size){

  function isoWeek(d){ var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); var day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day); var ys=new Date(Date.UTC(t.getUTCFullYear(),0,1)); var wk=Math.ceil((((t-ys)/86400000)+1)/7); return {num:wk,key:t.getUTCFullYear()+"-W"+wk}; }

      seg+
      '<div class="lightcard diana-card"><div class="big">'+targetSVG(sh,200)+'</div><div class="cap">'+(statScope==="todo"?"Toda la bolsa":CATS[statScope].label)+'<small>'+(sa.n?sa.n+" bolas · "+biasText(sa):"sin datos en esta familia")+'</small></div></div>'+
      (sa.n?'<div class="lightcard diana-bars">'+seg3(sa,"dir")+seg3(sa,"dist")+seg3(sa,"alt")+'</div>':'')+
      '<div class="board"><div class="board-head">Ranking de palos <span class="hint">peor &rarr; mejor · % a la derecha</span></div>'+(lbRows||'<div class="lbrow"><span class="club">Sin datos</span></div>')+'</div>'+
      '<div class="sectlabel"><span class="t">Desglose por familia</span><span class="l"></span></div>'+
      catNode("maderas")+catNode("hierros")+catNode("approaches")+
      '<button class="clearbtn" id="clr">Borrar todas las estad&iacute;sticas</button>';
    Array.prototype.forEach.call(view.querySelectorAll(".seg-ctrl button"),function(b){ b.addEventListener("click",function(){ statScope=b.getAttribute("data-scope"); renderStats(); }); });
    var c=document.getElementById("clr"); if(c) c.addEventListener("click",function(){ if(confirm("&iquest;Borrar TODO el historial? No se puede deshacer.")){ db={shots:[],completions:[]}; save(); render(); } });
  }

  function render(){ if(tab==="home") renderHome(); else if(tab==="train") renderTrain(); else renderStats();
    Array.prototype.forEach.call(document.querySelectorAll(".navbtn"),function(b){ b.classList.toggle("active",b.getAttribute("data-tab")===tab); }); window.scrollTo(0,0); }
  Array.prototype.forEach.call(document.querySelectorAll(".navbtn"),function(b){ b.addEventListener("click",function(){ var t=b.getAttribute("data-tab"); if(t==="train"&&!tr){ tab="home"; render(); return; } tab=t; freeOpen=false; render(); }); });

  (function(){ var d=new Date(),days=["Dom","Lun","Mar","Mi&eacute;","Jue","Vie","S&aacute;b"],mo=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]; document.getElementById("dateBox").innerHTML=days[d.getDay()]+" "+d.getDate()+" "+mo[d.getMonth()]+" · sem "+isoWeek(d).num; })();

  render();
})();
</script>
</body>
</html>
